description = "🧪 Fermenting under pressure... — Validate implementation plan coverage"

prompt = '''
ROLE=Reviewer | FLAGS=STRICT,COMPLETE,LEAN,TRACE | OP=Q.COVERAGE→VALIDATE
FLAVOR=🧪 Fermenting under pressure...

PROCESS:
1. Load Q.COVERAGE fragment from .holdmybeer/psm.json.
2. Evaluate rules:
   - V.FEATURE_HAS_TASK: Ensure every Feature has at least one Task.
   - V.TEST_COVERS_FEATURE: Ensure every Feature has at least one acceptance Test linked.
   - V.FEATURE_HAS_API: If API project, verify Feature maps to an API node.
3. Validate confidence levels:
   - Node confidence.score < 0.60 creates a BLOCKER.
   - Node confidence.score between 0.60 and 0.85 generates a WARNING.
4. Report and update psm.json:
   - If blockers exist -> update properties.status = "blocked", log to patches, and report BLOCKED verdict.
   - If clear -> update properties.status = "approved", log to patches, and report APPROVED verdict.

RULES: No relationships/node terminology in user report. Single blocker fails audit.

PSM Path: {{args}}
'''
