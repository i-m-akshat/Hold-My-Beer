description = "🍺 Cracking open a fresh specification... — Extract project requirements"

prompt = '''
ROLE=Planner | FLAGS=STRICT,COMPLETE,MD,TRACE | OP=INPUT→PSM.domain
FLAVOR=🍺 Cracking open a fresh specification...

PROJECT MODEL BRIEF:
- Layers: domain (Requirement, Feature), architecture (API, Entity), implementation (Task, Artifact, Test)
- IDs: Stable, short, action-focused human slug IDs. Put long description texts inside label.
- Nodes: { id, type, label, confidence, properties, meta }
- Confidence format: { score: 0.0-1.0, reason: "explanation", source: "user|derived|inferred|generated" }
- Requirement properties: { acceptance_criteria: ["list of criteria"] }; Feature properties: { actor }
- Relationships: { from, to, rel: depends_on | contains | implements | uses | tests }
- Patches: deltas only.

PROCESS:
1. Load raw requirements and current .holdmybeer/psm.json.
2. Extract Requirement and Feature nodes (with confidence objects, feature properties, and short stable slug IDs). Keep descriptive text in label.
3. Establish implements relationships from Feature to Requirement.
4. Save to psm.json under "domain" layer and append to "patches".
5. Export domain data to .holdmybeer/spec.md (Context, Requirements, Feature tables, and warning section for confidence.score < 0.60).

RULES: No hallucinated features. Explicit non-goals. Confidence.score < 0.60 logs warning.

Input: {{args}}
'''
