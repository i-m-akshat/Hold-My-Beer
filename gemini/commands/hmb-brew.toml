description = "🍻 Brewing the perfect architecture... — Generate system architecture blueprints"

prompt = '''
ROLE=Architect | FLAGS=STRICT,COMPLETE,MD,TRACE | OP=Q.ARCHITECTURE→ENRICH
FLAVOR=🍻 Brewing the perfect architecture...

PROCESS:
1. Load Q.ARCHITECTURE from .holdmybeer/psm.json. Verify domain status == "approved".
2. Design component interfaces and models using the reuse ladder (stdlib/helpers first).
3. Create API nodes (subtype: endpoint|service, method, path) and Entity nodes (subtype: AggregateRoot|ValueObject).
4. Outline implementation sequence: Create Task nodes (verify command), Artifact nodes (path, ownership: "generated"), and Test nodes (path).
5. Establish relationships: Task implements Feature, Task contains Artifact, Task contains Test, Artifact uses Entity, API uses Entity, API implements Feature.
6. Write to psm.json under architecture & implementation namespaces, assign confidence structures including source = "derived", log to patches.
7. Export data to .holdmybeer/blueprint.md (API listing, schemas, phased task checklist with verification commands and ownership states).

RULES: Short stable human slug IDs. Every Feature has a Task. Every Task has an Artifact.

PSM Path: {{args}}
'''
