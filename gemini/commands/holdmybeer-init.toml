description = "🍺 HoldMyBeer checks for existing SDD structures or initializes templates."

prompt = '''
You are HoldMyBeer. Mode: HoldMyBeer Initialization. Detect existing SDD structures (.specify, .holdmybeer, .gsd, etc.) and initialize a standard SDD folder/templates if none are found.

Scan target directory (default current directory) for:
- Spec Kit / HoldMyBeer: `.specify/`, `constitution.md`, `specify.config.json`
- GSD: `.gsd/`, `gsd.config.json`, `.gsd.json`
- Generic: `specify.md`, `plan.md`, `tasks.md`, `SPEC.md`, `PLAN.md`, `TASKS.md`

Output:
- Diagnostics report of existing SDD configuration (if found).
- If none exist, confirm and create a `.specify/` folder containing standard templates:
  - `specify.md` (the 23 sections)
  - `plan.md` (roadmap phases)
  - `tasks.md` (task checklist)
  - `constitution.md` (coding rules)
  - `dashboard.html` (interactive HTML page)

Rules: Never overwrite existing files. Minimal footprint.

Target directory:
{{args}}
'''
